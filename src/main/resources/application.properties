spring.application.name=ems-backend
server.port=${PORT:8080}

# PostgreSQL (Render ENV required)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
# Email Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:rohanmane259@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:dklc jqfg xyjt ykcu}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# Security Configuration
app.jwt.secret=${APP_JWT_SECRET:your-very-secure-fixed-256-bit-key-for-ems-project-2026-v1}

# Admin Security Configuration
app.admin.email=${APP_ADMIN_EMAIL:admin@gmail.com}
app.admin.master-pin=${APP_ADMIN_PIN:789456}
app.admin.default-password=${APP_ADMIN_PASSWORD:admin123}

# Resolve Bean Conflict
spring.main.allow-bean-definition-overriding=true

# Frontend Public URL
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# File Upload Directory
app.upload.dir=${UPLOAD_DIR:./uploads/}
